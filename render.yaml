services:
    - type: web
      name: vizitka-app
      runtime: docker
      dockerfilePath: ./Dockerfile
      dockerContext: .
      envVars:
          - key: APP_ENV
            value: production
          - key: APP_DEBUG
            value: 'false'
          - key: APP_URL
            value: https://vizitka-app.onrender.com
          - key: APP_KEY
            generateValue: true
          - key: ASSET_URL
            value: https://vizitka-app.onrender.com
          - key: DB_CONNECTION
            value: mysql
          - key: DB_HOST
            fromDatabase:
                name: vizitka-mysql
                property: host
          - key: DB_PORT
            fromDatabase:
                name: vizitka-mysql
                property: port
          - key: DB_DATABASE
            fromDatabase:
                name: vizitka-mysql
                property: database
          - key: DB_USERNAME
            fromDatabase:
                name: vizitka-mysql
                property: user
          - key: DB_PASSWORD
            fromDatabase:
                name: vizitka-mysql
                property: password
          - key: DATABASE_URL
            fromDatabase:
                name: vizitka-mysql
                property: connectionString
          - key: SESSION_DRIVER
            value: cookie
          - key: CACHE_STORE
            value: database
          - key: QUEUE_CONNECTION
            value: database
          - key: BCRYPT_ROUNDS
            value: '12'
          - key: LOG_CHANNEL
            value: stderr
          - key: MAIL_MAILER
            value: log
          - key: SEED_ON_DEPLOY
            value: 'true'
      region: oregon
      plan: free
      healthCheckPath: /

databases:
    - name: vizitka-mysql
      databaseName: vizitka
      user: vizitka
      plan: free
      region: oregon
      engine: mysql
      mysqlVersion: 8
