services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: vizitka-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
        networks:
            - vizitka
        depends_on:
            - postgres

    nginx:
        image: nginx:alpine
        container_name: vizitka-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - vizitka
        depends_on:
            - app

    postgres:
        image: postgres:17-alpine
        container_name: vizitka-postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: vizitka
            POSTGRES_USER: vizitka
            POSTGRES_PASSWORD: vizitka
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks:
            - vizitka

volumes:
    postgres-data:

networks:
    vizitka:
        driver: bridge
