services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: vizitka-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
        networks:
            - vizitka
        depends_on:
            - mysql

    nginx:
        image: nginx:alpine
        container_name: vizitka-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - vizitka
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: vizitka-mysql
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: vizitka
            MYSQL_USER: vizitka
            MYSQL_PASSWORD: vizitka
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - vizitka

volumes:
    mysql-data:

networks:
    vizitka:
        driver: bridge
